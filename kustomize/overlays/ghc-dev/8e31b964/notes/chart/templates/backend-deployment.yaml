apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-backend
  labels:
    app.kubernetes.io/name: notes-backend
    app.kubernetes.io/part-of: notes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notes-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notes-backend
        app.kubernetes.io/part-of: notes
    spec:
      serviceAccountName: {{ .Values.tenant.workloadServiceAccount }}
      imagePullSecrets:
        - name: {{ .Values.registrySecretName }}
      securityContext:
        {{- include "notes.podSecurityContext" . | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - name: grpc
              containerPort: 50051
          env:
            - name: NOTES_SERVER_LISTEN
              value: ":50051"
            - name: NOTES_SERVER_REFLECTION
              value: "false"
            - name: NOTES_DATABASE_HOST
              value: "{{ .Values.db.name }}-rw"
            - name: NOTES_DATABASE_PORT
              value: "5432"
            - name: NOTES_DATABASE_NAME
              value: {{ .Values.db.database | quote }}
            - name: NOTES_DATABASE_SSLMODE
              value: "require"
            - name: NOTES_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: notes-db-credentials
                  key: username
            - name: NOTES_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notes-db-credentials
                  key: password
            - name: NOTES_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            - name: NOTES_AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: notes-app-secrets
                  key: session_secret
            - name: NOTES_AUTH_BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.auth.bootstrapAdminEmail | quote }}
            - name: NOTES_AUTH_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notes-app-secrets
                  key: bootstrap_admin_password
          securityContext:
            {{- include "notes.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
