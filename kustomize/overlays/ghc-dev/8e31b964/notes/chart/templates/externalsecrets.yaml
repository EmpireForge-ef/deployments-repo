apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notes-db-credentials
  labels:
    app.kubernetes.io/part-of: notes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.secrets.secretStore }}
  target:
    name: notes-db-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/db
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/db
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notes-app-secrets
  labels:
    app.kubernetes.io/part-of: notes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.secrets.secretStore }}
  target:
    name: notes-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: session_secret
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/app
        property: session_secret
    - secretKey: bootstrap_admin_password
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/app
        property: bootstrap_admin_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.registrySecretName }}
  labels:
    app.kubernetes.io/part-of: notes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.secrets.secretStore }}
  target:
    name: {{ .Values.registrySecretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ `{{ $auth := printf \"%s:%s\" .username .password | b64enc }}{\"auths\":{\"{{ .registry }}\":{\"username\":\"{{ .username }}\",\"password\":\"{{ .password }}\",\"auth\":\"{{ $auth }}\"}}}` }}"
  data:
    - secretKey: registry
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/registry
        property: registry
    - secretKey: username
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/registry
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.kvPath }}/registry
        property: password
