apiVersion: v1
kind: ConfigMap
metadata:
  name: notes-envoy-config
  labels:
    app.kubernetes.io/name: notes-envoy
    app.kubernetes.io/part-of: notes
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: grpc_web_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 4005
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: notes_backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/grpc/"
                              route:
                                prefix_rewrite: "/"
                                cluster: notes_backend
                                timeout: 0s
                            - match:
                                prefix: "/"
                              route:
                                cluster: notes_backend
                                timeout: 0s
                          typed_per_filter_config:
                            envoy.filters.http.cors:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                              allow_origin_string_match:
                                - safe_regex:
                                    regex: ".*"
                              allow_methods: "GET, PUT, DELETE, POST, OPTIONS"
                              allow_headers: "keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,authorization,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout"
                              max_age: "1728000"
                              expose_headers: "grpc-status,grpc-message"
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: notes_backend
          type: STRICT_DNS
          connect_timeout: 5s
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: notes_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: notes-backend
                          port_value: 50051
