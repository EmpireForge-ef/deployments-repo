apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes
  labels:
    app.kubernetes.io/name: notes
    app.kubernetes.io/part-of: notes
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer | quote }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.host | quote }}
      secretName: notes-tls
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          - path: /grpc
            pathType: Prefix
            backend:
              service:
                name: notes-envoy
                port:
                  name: grpc-web
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notes-frontend
                port:
                  name: http
