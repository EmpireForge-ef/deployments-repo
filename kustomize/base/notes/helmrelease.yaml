apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: notes
spec:
  releaseName: notes
  interval: 10m
  chart:
    spec:
      chart: notes
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: notes-charts
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
